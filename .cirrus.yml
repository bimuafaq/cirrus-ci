  TG_CHAT_ID: "ENCRYPTED[!4508643dc06e496a5bdef35696637b616238ec9af7111e0efb265d7adbee5a3f5890d487225ccdb1d259b189cf5a567d!]"
  GIT_GITCONFIGS: "ENCRYPTED[!5ac5f7e17bbdc60d88ddde16c0fa3108b36bc9810a169cccde65cd85733cf7a43288ccb2f37e97129ec29ba9b4a54e5d!]"
  GIT_CREDENSIAL: "ENCRYPTED[!6912fc4e5cb1786a6b6644ebf2be36c65edee9a49ea4561db2365755753644e9ad86e5160e86ff847b871c750abc2dfe!]"
  RCLONE_DATA: "ENCRYPTED[!b0cb2b49ad101441d6d67117e5626699c16fe78b7cae9912de387374d08a0df868fa5f659d03048bc8bdd91f900f06c2!]"
  RCLONE_REMOTE: "ro:x"
  CCACHE_ARCHIVE: "lin-18.tar.gz"
  NINJA_HIGHMEM_NUM_JOBS: "1"
  # GITHUB_TOKEN: ""

task:
  name: "Build CI"
  timeout_in: 120m
  container:
    image: ghcr.io/rovars/docker:rovx
    cpu: 8
    memory: 32G
    greedy: true
  setup_script:
    - echo "$GIT_CREDENSIAL" > ~/.git-credentials
    - echo "$GIT_GITCONFIGS" > ~/.gitconfig
    - mkdir -p ~/.config/rclone
    - echo "$CIRRUS_RCLONE_DATA" > ~/.config/rclone/rclone.conf
    - rm -rf .git
    - rovx --start
  # restore_ccache_script: rovx --restore
  resync_script: ./build.sh --sync
  build_script: ./build.sh --build
  # save_ccache_script: rovx --save
  upload_script: ./build.sh --upload
  on_failure:
    notif_error_script:
      - if [ -f out/error.log ]; then rovx --post "out/error.log" "Build failed! Check error logs."; else rovx --post "Build failed! No error log found."; fi

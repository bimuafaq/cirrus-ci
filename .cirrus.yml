  CCACHE_ARCHIVE: "vanadium-bi.tar.gz"
  RCLONE_REMOTE: "rov:x"
 
task:
  name: "Build Vanadium"
  timeout_in: 120m
  container:
    image: ghcr.io/rovars/docker:chrome
    cpu: 8
    memory: 32G
    greedy: true

  setup_script:
    - echo "$credensial" > ~/.git-credentials
    - echo "$gitconfigs" > ~/.gitconfig
    - mkdir -p ~/.config/rclone
    - echo "$RCLONE_DATA" > ~/.config/rclone/rclone.conf
    - rm -rf .git
    - rovx --start
    - git clone -q https://rovars:${GITHUB_TOKEN}@github.com/rovars/rom rom

  restore_ccache_script: rovx --restore
  build_script: ./build.sh
  save_ccache_script: rovx --save
